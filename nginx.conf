# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# Load dynamic modules. See /usr/share/doc/nginx/README.dynamic.
include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    # Load modular configuration files from the /etc/nginx/conf.d directory.
    # See http://nginx.org/en/docs/ngx_core_module.html#include
    # for more information.
    include /etc/nginx/conf.d/*.conf;
    gzip on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  saifchat.com;
        root         /usr/share/nginx/html;

        # 设置该域名的最大上传大小为 10GB
        client_max_body_size 10G;

        # Load configuration files for the default server block.
        include /etc/nginx/default.d/*.conf;

        location / {
            proxy_pass    http://localhost:3000;
        }

        location /_next/static {
            add_header Cache-Control "public, max-age=3600, immutable";
            proxy_pass http://127.0.0.1:3000/_next/static;
        }
        location /lab {
            proxy_pass    http://localhost:5389/lab;
        }
        location /static/lab {
            proxy_pass    http://localhost:5389/static/lab;
        }
        location /user {
            proxy_pass    http://localhost:8000/user;
        }
        location /viewimages {
            proxy_pass    http://localhost:5173;
        }
        location /imagesupload {
            proxy_pass    http://localhost:3001;
        }
        location /hub {
            proxy_pass  http://localhost:8000/hub;
            # 允许跨域
            add_header Access-Control-Allow-Origin "https://frontend.example.com" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-Requested-With, Content-Type, X-XSRF-TOKEN" always;

            # 允许请求头和 Cookie 透传
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api {
            proxy_pass    http://localhost:5389;
        }
        location /upload-images {
            alias /usr/share/nginx/images;
        }

        # 劳动仲裁调解系统子目录配置
        location /laodongzhongcai/ {
            alias /root/laodongzhongcai/frontend/dist/;
            try_files $uri $uri/ /laodongzhongcai/index.html;
        }

        location /laodongzhongcai/api {
            proxy_pass http://127.0.0.1:5003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /laodongzhongcai/socket.io {
            proxy_pass http://127.0.0.1:5003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        error_page 404 /404.html;
        location = /40x.html {
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

    server {
        #SSL 默认访问端口号为 443
        listen 443 ssl;
        # 设置该域名的最大上传大小为 10GB
        client_max_body_size 10G;

        #请填写绑定证书的域名
        server_name www.saifchat.com;

        #请填写证书文件的相对路径或绝对路径
        ssl_certificate /etc/nginx/www.saifchat.com_ngixn/www.saifchat.com_bundle.crt;
        #请填写私钥文件的相对路径或绝对路径
        ssl_certificate_key /etc/nginx/www.saifchat.com_ngixn/www.saifchat.com.key;
        ssl_session_timeout 5m;
        #请按照以下协议配置
        ssl_protocols TLSv1.2 TLSv1.3;
        #请按照以下套件配置，配置加密套件，写法遵循 openssl 标准。
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass    http://localhost:3000;
        }
        location /lab {
            proxy_pass    http://localhost:5389/lab;
        }
        location /static/lab {
            proxy_pass    http://localhost:5389/static/lab;
        }
        location /viewimages {
            proxy_pass    http://localhost:5173;
        }
        location /imagesupload {
            proxy_pass   http://localhost:3001;
        }
        location ~ ^/user/(.*)/api/kernels/(.*) {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_pass http://127.0.0.1:8000/user/$1/api/kernels/$2;
        }
        location ~ ^/user/(.*)/api/events/(.*) {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_pass http://127.0.0.1:8000/user/$1/api/events/$2;
        }
        location /user {
            proxy_pass    http://localhost:8000/user;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Scheme $scheme;
        }
        location /hub {
            proxy_pass  http://localhost:8000/hub;
            # 允许跨域
            add_header Access-Control-Allow-Origin "https://frontend.example.com" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "X-Requested-With, Content-Type, X-XSRF-TOKEN" always;
            # 允许请求头和 Cookie 透传
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /api {
            proxy_pass    http://localhost:5389;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /_next/static {
            add_header Cache-Control "public, max-age=3600, immutable";
            proxy_pass http://127.0.0.1:3000/_next/static;
        }
        location /upload-images {
            alias /usr/share/nginx/images;
        }

        # 劳动仲裁调解系统子目录配置
        location /laodongzhongcai/ {
            alias /root/laodongzhongcai/frontend/dist/;
            try_files $uri $uri/ /laodongzhongcai/index.html;
        }

        location /laodongzhongcai/api {
            proxy_pass http://127.0.0.1:5003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /laodongzhongcai/socket.io {
            proxy_pass http://127.0.0.1:5003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}